<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Display - DANZONA PHARMACY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1a1a2e; color: white; font-family: 'Segoe UI', sans-serif; }
        .display-container { max-width: 800px; margin: 50px auto; text-align: center; }
        .logo { font-size: 3rem; margin-bottom: 20px; }
        .welcome-text { font-size: 2rem; margin-bottom: 30px; }
        .total-box { background: linear-gradient(135deg, #198754, #146c43); border-radius: 20px; padding: 40px; margin: 30px 0; }
        .total-label { font-size: 1.5rem; }
        .total-amount { font-size: 4rem; font-weight: bold; }
        .qr-code { width: 150px; height: 150px; margin: 20px auto; background: white; border-radius: 10px; }
        .footer { margin-top: 50px; color: rgba(255,255,255,0.5); }
    </style>
    <meta http-equiv="refresh" content="30">
</head>
<body>
    <div class="display-container">
        <div class="logo">💊</div>
        <h1 class="welcome-text">Welcome to DANZONA PHARMACY</h1>
        <p>AKWANGA, NIGERIA</p>
        
        <div class="total-box">
            <div class="total-label">Total Amount Due</div>
            <div class="total-amount" id="totalDisplay">₦0.00</div>
        </div>
        
        <div class="qr-code">
            <i class="fas fa-qrcode fa-5x text-dark" style="line-height: 150px;"></i>
        </div>
        
        <p>Scan to Pay</p>
        
        <div class="footer">
            <p>Thank you for your patronage!</p>
            <p>God Bless Nigeria 🇳🇬</p>
        </div>
    </div>
    
    <script>
        // Auto-refresh to show latest total
        setTimeout(function() {
            location.reload();
        }, 30000);
    </script>
</body>
</html>
